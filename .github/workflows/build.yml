name: Build and upload to PyPI

on:
  push:
    branches:
      - "**"
  pull_request: {}

# For musllinux support, see note in pyproject.toml

jobs:
  wheels_linux:
    name: ${{ matrix.id }}
    runs-on: ubuntu-24.04
    env:
      CIBW_BUILD: "${{ matrix.build }}"
    strategy:
      # One wheel target per worker. The x86_64 runners intermittently fail to
      # spawn a subprocess during the *second* build in a sequence (cp311 after
      # cp310), dying with "No such file or directory" at the compiler check.
      # Building a single target per job makes every build the first in its job,
      # which sidesteps the failure. fail-fast: false so one target's flake does
      # not cancel the others. musllinux x86_64 has not shown the failure, so it
      # stays a single (all-targets) job. aarch64 is built in wheels_linux_arm.
      fail-fast: false
      matrix:
        include:
          - { id: cp310-manylinux_x86_64, build: cp310-manylinux_x86_64 }
          - { id: cp311-manylinux_x86_64, build: cp311-manylinux_x86_64 }
          - { id: cp312-manylinux_x86_64, build: cp312-manylinux_x86_64 }
          - { id: cp313-manylinux_x86_64, build: cp313-manylinux_x86_64 }
          - { id: cp314-manylinux_x86_64, build: cp314-manylinux_x86_64 }
          - { id: cp314t-manylinux_x86_64, build: cp314t-manylinux_x86_64 }
          - { id: musllinux_x86_64, build: "*-musllinux_x86_64" }
    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.0.0

      - name: Audit abi3 wheels
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(wheelhouse/*-abi3-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No abi3 wheels to audit."
            exit 0
          fi
          pipx run abi3audit --strict --report "${wheels[@]}"

      - name: Upload built wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.id }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  wheels_linux_arm:
    name: ${{ matrix.platform }}
    runs-on: ubuntu-24.04-arm
    env:
      CIBW_BUILD: "*-${{ matrix.platform }}"
    strategy:
      matrix:
        platform: [manylinux_aarch64, musllinux_aarch64]
    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.0.0

      - name: Audit abi3 wheels
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(wheelhouse/*-abi3-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No abi3 wheels to audit."
            exit 0
          fi
          pipx run abi3audit --strict --report "${wheels[@]}"

      - name: Upload built wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  wheels_macos:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CIBW_BUILD: "*"
    strategy:
      matrix:
        # macos-14 is Apple silicon and we configure it to build only arm64 wheels.
        # See notes in build.rst.
        include:
          - os: macos-15-intel
            os_arch: macos-x86_64
          - os: macos-14
            os_arch: macos-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install UV for cibuildwheel
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.0.0

      - name: Audit abi3 wheels
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(wheelhouse/*-abi3-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No abi3 wheels to audit."
            exit 0
          fi
          pipx run abi3audit --strict --report "${wheels[@]}"

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os_arch }}
          path: ./wheelhouse/*.whl

  wheels_windows:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    env:
      CIBW_BUILD: "*-${{ matrix.platform }}"
      CIBW_ENVIRONMENT: >-
        QPDF_SOURCE_TREE="d:\\qpdf"
        QPDF_BUILD_LIBDIR="d:\\qpdf\\lib"
    strategy:
      matrix:
        os: [windows-2022]
        platform: [win_amd64]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: "3.10"

      - name: Install tomli and read environment from pyproject.toml
        run: |
          python -m pip install tomli
          python build-scripts/environ-from-pyproject.py >> $env:GITHUB_ENV
          dir env:

      - name: Download QPDF
        run: |
          build-scripts/win-download-qpdf.ps1 $env:QPDF_VERSION ${{ matrix.platform }}

      - name: Install UV for cibuildwheel
        run: |
          powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.0.0

      - name: Audit abi3 wheels
        shell: bash
        run: |
          shopt -s nullglob
          wheels=(wheelhouse/*-abi3-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "No abi3 wheels to audit."
            exit 0
          fi
          pipx run abi3audit --strict --report "${wheels[@]}"

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform }}
          path: ./wheelhouse/*.whl

  sdist:
    name: source distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: "3.10"

      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake jbig2dec lcov libexempi8 poppler-utils

      - name: Install tomli and read environment from pyproject.toml
        run: |
          python -m pip install tomli
          python build-scripts/environ-from-pyproject.py >> $GITHUB_ENV

      - name: Download QPDF
        run: build-scripts/posix-download-qpdf.bash $QPDF_MIN_VERSION

      - name: Add /usr/local/lib to dynamic linker path
        run: echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/local-lib.conf

      - name: Build QPDF
        run: build-scripts/posix-build-sdist-deps.bash

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel build
          python -m build --sdist

      - name: Install and test sdist (isolated)
        run: |
          python -m venv v
          source v/bin/activate
          python -m pip install --upgrade pip  # need pip>=25.1 for PEP 735 --group
          SDIST=dist/*.tar.gz
          SDIST_EXPANDED=$(echo -n $SDIST)
          python -m pip install ${SDIST_EXPANDED} --group test
          python -m pytest -nauto
          deactivate

      - name: Install local project as editable with coverage
        run: |
          # Install build deps so we can use --no-build-isolation
          python -m pip install "scikit-build-core>=0.10" "nanobind>=2.0"
          # Build C++ extension with coverage flags via scikit-build-core.
          # --no-build-isolation + SKBUILD_BUILD_DIR keep .gcno/.gcda files
          # in a persistent directory so lcov can find them after tests run.
          SKBUILD_BUILD_DIR=build/coverage \
            CMAKE_ARGS="-DCMAKE_CXX_FLAGS=--coverage -DCMAKE_SHARED_LINKER_FLAGS=--coverage" \
            python -m pip install --no-build-isolation -e . --group test
          python -m pytest -nauto --cov-report xml --cov=src

      - name: Generate C++ coverage reports
        run: |
          lcov --capture --directory build/coverage --output-file cpp_coverage_all.info
          lcov --extract cpp_coverage_all.info '*/src/core/*' -o cpp_coverage.info
          rm cpp_coverage_all.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml,./cpp_coverage.info

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  test_abi3_debug_python:
    # Catch regressions of the class where the abi3 wheel violates a CPython
    # invariant that is enforced only by debug builds (assertion-enabled
    # interpreters). Regression motivating this job: pikepdf #723 / nanobind
    # #1286, where the stable-ABI metaclass had Py_TPFLAGS_HAVE_VECTORCALL set
    # without tp_call, crashing at import on Py_DEBUG interpreters. Release
    # CPython compiles _PyObject_ASSERT to a no-op, so the cibuildwheel test
    # phase against stock Python could not catch this.
    #
    # Linux only. Windows debug Python cannot load abi3 wheels: python_d.exe
    # links against python314_d.dll, but the abi3 _core.pyd forwards through
    # python3.dll to the release python314.dll, producing an ABI mismatch
    # that surfaces as "cannot import name '_core' from partially initialized
    # module 'pikepdf' (most likely due to a circular import)". This is a
    # Windows-only abi3+debug limitation, not a pikepdf bug; skip the
    # platform here rather than try to work around it.
    name: test abi3 wheel on debug Python (${{ matrix.platform }})
    needs: [wheels_linux, wheels_linux_arm]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: manylinux_x86_64
            runner: ubuntu-24.04
          - platform: manylinux_aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          # wheels_linux fans manylinux x86_64 out to one artifact per target,
          # so match them all (incl. the cp314 abi3 wheel) by pattern. aarch64
          # is still a single wheels-manylinux_aarch64 artifact, also matched.
          pattern: wheels-*${{ matrix.platform }}
          path: wheelhouse
          merge-multiple: true

      - name: Install debug Python 3.14
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y \
            python3.14-dbg \
            python3.14-venv \
            python3.14-dev

      - name: Locate abi3 wheel
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(wheelhouse/*-abi3-*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "ERROR: no abi3 wheel found in artifact" >&2
            ls -la wheelhouse/ >&2
            exit 1
          fi
          echo "ABI3_WHEEL=${wheels[0]}" >> "$GITHUB_ENV"

      - name: Smoke-import pikepdf with debug Python
        # The pikepdf package's top-level import is enough to fire the
        # nanobind metaclass assertion if it has regressed.
        run: |
          set -euo pipefail
          python3.14-dbg -VV
          python3.14-dbg -m pip install --upgrade pip
          python3.14-dbg -m pip install --no-deps "$ABI3_WHEEL" packaging
          python3.14-dbg -c "import pikepdf._core; print('pikepdf._core import OK')"
          python3.14-dbg -c "import pikepdf; print('pikepdf', pikepdf.__version__, 'import OK')"

      - name: Run abi3 smoke test subset with debug Python
        # Pillow/lxml/numpy don't publish cp314d-tagged wheels and building
        # them from sdist is slow and fragile. Instead, select the tests
        # marked @pytest.mark.abi3_smoke -- a curated subset that exercises
        # the C extension surface without crossing into runtime code paths
        # that require those native packages (e.g. Pdf.save() pulls lxml
        # through the XMP updater).
        #
        # `-m abi3_smoke` filters which tests *run*, but pytest still has
        # to *import* every test module during collection. `hypothesis` is
        # pure-Python so we install it to unblock module imports. The three
        # files that hard-import PIL or lxml at module level get --ignore'd
        # since no amount of `-m` filtering can prevent their import.
        run: |
          set -euo pipefail
          python3.14-dbg -m pip install pytest pytest-xdist pytest-timeout hypothesis
          python3.14-dbg -m pytest -nauto --timeout=300 -m abi3_smoke \
            --ignore=tests/test_canvas.py \
            --ignore=tests/test_image_access.py \
            --ignore=tests/test_metadata.py \
            tests/

  stage_artifacts:
    name: Stage artifacts to draft release
    needs: [wheels_linux, wheels_macos, wheels_windows, wheels_linux_arm, sdist, test_abi3_debug_python]
    runs-on: ubuntu-latest
    # Only stage on pushes to main branch (not PRs or tags)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist

      - name: Read version from source
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__ = \"(.+)\"', open('src/pikepdf/_version.py').read()).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or update draft release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          # Delete existing draft release if it exists (ignore errors)
          gh release delete "$TAG" --yes 2>/dev/null || true

          # Create new draft release with all artifacts
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --notes "Draft release - will be updated when tag is pushed" \
            dist/*
